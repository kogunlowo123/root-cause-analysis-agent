# Root Cause Analysis Agent — Development Configuration
app:
  name: root-cause-analysis-agent
  env: development
  debug: true
  log_level: DEBUG
  log_format: console

database:
  url: postgresql+asyncpg://postgres:postgres@localhost:5432/root_cause_analysis_agent

redis:
  url: redis://localhost:6379/0

vector_store:
  type: opensearch
  url: https://localhost:9200
  index: root_cause_analysis_agent_vectors

llm:
  default_provider: openai
  model: gpt-4o-mini
  temperature: 0.1

token_budget:
  user_daily: 1000000
  org_monthly: 50000000

rate_limiting:
  requests_per_minute: 1000

guardrails:
  enabled: false

tracing:
  enabled: false
